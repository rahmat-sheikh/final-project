<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admission Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <div class="form-container">
        <h2>Admission Registration Form</h2>
        <form action="#" method="POST">
            <!-- Personal Information -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <!-- Academic Information -->
            <div class="form-group">
                <label for="department">Select Department</label>
                <select id="department" name="department" required>
                    <option value="">--Choose Department--</option>
                    <option value="cse">Computer Science & Engineering (CSE)</option>
                    <option value="eee">Electrical & Electronic Engineering (EEE)</option>
                    <option value="bba">Bachelor of Business Administration (BBA)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gpa">HSC GPA</label>
                <input type="number" step="0.01" id="gpa" name="gpa" placeholder="e.g. 4.75" required>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

</body>
</html>
